server {
    listen 80;
    server_name localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy per l'Admin Dashboard API (Statistiche e Log reali)
    location ~ ^/api/(overview|logs|stream-ticket|stream|ai|db-check|session|ip|timeseries) {
        proxy_pass http://admin:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # SSE specific optimizations
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
        proxy_set_header Connection '';
    }

    # Proxy specifico per Terminal Monitor (Moved to Admin service for consistency)
    location /api/admin/terminal/ {
        proxy_pass http://admin:5003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy per la trappola (decoy/trap) - rimuove il prefisso /trap
    location /trap/ {
        rewrite ^/trap/(.*)$ /$1 break;
        proxy_pass http://honeypot:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy per SaaS Auth (Tenant, Login, Chiavi API) → Admin Server
    location /api/v1/saas {
        proxy_pass http://admin:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header x-admin-token $http_x_admin_token;
        proxy_set_header Authorization $http_authorization;
    }

    # Proxy per l'SDK (Logs, Honeytokens, AI Analysis) → Honeypot Server
    location /api/v1/sdk {
        proxy_pass http://honeypot:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header x-api-key $http_x_api_key;
        proxy_set_header x-app-name $http_x_app_name;
    }

    # Proxy per l'Honeypot (Baits, Intel, Auth, Websocket Terminal)
    # Include anche estensioni comuni cercate dagli attaccanti (.php, .jsp, etc)
    location ~ ^/(api/intel|api/v1|auth|login|wp-admin|admin|administrator|.*\.php|.*\.jsp|.*\.aspx?|.*\.cgi) {
        proxy_pass http://honeypot:5002;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Proxy specifico per Socket.io (Terminale Virtuale)
    location /socket.io/ {
        proxy_pass http://honeypot:5002/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }

    # Opzionale: gestione degli errori
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
