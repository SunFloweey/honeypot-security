services:
  # Database: PostgreSQL
  db:
    image: postgres:15
    restart: always
    environment:
      - POSTGRES_DB=honeypot
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_internal
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d honeypot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Docker Socket Proxy (Zero Trust - least privilege socket access)
  # Solo l'honeypot/admin possono usare questo proxy su rete interna.
  # Il proxy espone SOLO le operazioni permesse (exec su container sandbox).
  docker_proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: always
    environment:
      CONTAINERS: 1   # Permette: list/inspect containers
      EXEC: 1         # Permette: exec in container (per sandbox terminal)
      IMAGES: 1       # Permette: listImages() usato da DockerService.init() per check disponibilità
      VOLUMES: 0      # Blocca: gestione volumi
      NETWORKS: 0     # Blocca: gestione reti
      POST: 1         # Necessario per exec e createContainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    tmpfs:
      - /tmp          # HAProxy scrive /tmp/haproxy.cfg qui; in-memory, non persiste sull'host
    networks:
      - backend_internal
    security_opt:
      - no-new-privileges:true
    # read_only rimosso: HAProxy deve creare /tmp/haproxy.cfg all'avvio
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M

  # Honeypot Backend (Attack Surface)
  honeypot:
    build:
      context: ./backend
    restart: always
    command: node server.js
    env_file:
      - backend/.env
    environment:
      - DB_HOST=db
      - PORT=5002
      - VAULT_HOST=admin
      - VAULT_PORT=5003
      # Il socket Docker viene acceduto SOLO tramite proxy TCP su rete interna
      - DOCKER_HOST=tcp://docker_proxy:2375
    volumes:
      - ./secure_vault_keys:/app/secure_vault_keys
      - ./vault_storage:/app/secure_vault
      - ./sdk:/app/sdk
      # /var/run/docker.sock NON montato direttamente (prevenzione container escape)
    networks:
      - backend_internal
      - frontend_network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    ports:
      - "5002:5002"
    depends_on:
      db:
        condition: service_healthy
      docker_proxy:
        condition: service_started

  # DIANA Terminal Sandbox (Real Terminal - massima restrizione)
  sandbox:
    build:
      context: ./backend
      dockerfile: Dockerfile.sandbox
    restart: always
    container_name: diana_sandbox
    hostname: diana-server
    networks:
      - isolated_network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=10m
      - /home/sysadmin:noexec,nosuid,size=50m
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 256M
          pids: 50

  # Admin Dashboard Backend (Management)
  admin:
    build:
      context: ./backend
    restart: always
    command: node admin-server.js
    env_file:
      - backend/.env
    environment:
      - DB_HOST=db
      - PORT=5003
      - DOCKER_HOST=tcp://docker_proxy:2375
    networks:
      - backend_internal
      - frontend_network
    deploy:
      resources:
        limits:
          cpus: '0.4'
          memory: 512M
    ports:
      - "5003:5003"
    volumes:
      - ./secure_vault_keys:/app/secure_vault_keys
      - ./vault_storage:/app/secure_vault
      # /var/run/docker.sock NON montato direttamente
    depends_on:
      db:
        condition: service_healthy
      docker_proxy:
        condition: service_started

  # Frontend (Vite + Nginx)
  frontend:
    build:
      context: ./frontend
    restart: always
    networks:
      - frontend_network
    ports:
      - "80:80"
    depends_on:
      honeypot:
        condition: service_started
      admin:
        condition: service_started

# Network segmentation: Zero Trust
networks:
  # Rete interna: DB, proxy Docker, backend services. NON raggiungibile dall'esterno.
  backend_internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.21.0.0/24
  # Rete per il traffico frontend <-> backend
  frontend_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24
  # Rete completamente isolata per la sandbox terminale
  isolated_network:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  postgres_data:
  vault_data:
  vault_keys:
